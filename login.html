<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso Staff – Total Lift</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
body{background:var(--dark);display:flex;align-items:center;justify-content:center;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(65,156,201,0.07) 0%,transparent 70%);pointer-events:none}
.login-wrap{background:var(--white);padding:3.5rem 3rem;max-width:400px;width:100%;position:relative}
.login-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.login-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--dark);margin-bottom:0.3rem;text-align:center}
.login-sub{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--mid);text-align:center;margin-bottom:2.5rem}
.login-wrap h2{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--dark);margin-bottom:0.3rem;text-align:center}
.login-wrap p{font-size:0.82rem;color:var(--mid);margin-bottom:2rem;text-align:center;font-weight:300}
.field--light{margin-bottom:1rem}
.err{color:var(--red);font-size:0.8rem;margin-bottom:1rem;text-align:center}
.back-link{display:block;text-align:center;margin-top:1.2rem;font-size:0.75rem;color:var(--mid);text-decoration:none;transition:color .2s}
.back-link:hover{color:var(--blue)}
</style>
</head>
<body>
<div class="login-wrap">
  <p class="login-logo">RICCIARDI</p>
  <p class="login-sub">Studio Dermistico</p>
  <h2>Dashboard</h2>
  <p>Accesso riservato allo staff</p>
  <div class="field field--light"><label class="dark">Username</label><input type="text" id="u" placeholder="admin" autocomplete="username"></div>
  <div class="field field--light"><label class="dark">Password</label><input type="password" id="p" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div>
  <div id="err" class="err hidden">Credenziali non valide. Riprova.</div>
  <button class="btn btn--primary btn--full" onclick="login()">Accedi</button>
  <a href="../index.html" class="back-link">← Torna al sito</a>
</div>
<script src="../assets/app.js"></script>
<script>
function login(){
  const u=document.getElementById('u').value;
  const p=document.getElementById('p').value;
  const pw=TL.cfg().adminPw||'ricciardi2025';
  if(u==='admin'&&p===pw){
    sessionStorage.setItem('tl_auth','1');
    window.location.href='dashboard.html';
  }else{
    document.getElementById('err').classList.remove('hidden');
    document.getElementById('p').value='';
  }
}
// redirect if already logged
if(sessionStorage.getItem('tl_auth')==='1') window.location.href='dashboard.html';
</script>
</body>
</html>
